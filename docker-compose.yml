services:
    laravel.test:
        container_name: backend
        build:
            context: './vendor/laravel/sail/runtimes/8.4'
            dockerfile: Dockerfile
            args:
                WWWGROUP: '${WWWGROUP}'
        image: 'sail-8.4/app'
        extra_hosts:
            - 'host.docker.internal:host-gateway'
        ports:
            - '${APP_PORT:-80}:80'
            # - '${VITE_PORT:-5173}:${VITE_PORT:-5173}'
        environment:
            WWWUSER: '${WWWUSER}'
            LARAVEL_SAIL: 1
            XDEBUG_MODE: '${SAIL_XDEBUG_MODE:-off}'
            XDEBUG_CONFIG: '${SAIL_XDEBUG_CONFIG:-client_host=host.docker.internal}'
            IGNITION_LOCAL_SITES_PATH: '${PWD}'
        volumes:
            - '.:/var/www/html'
        networks:
            - sail
            - blog-network
        depends_on:
            - pgsql
            - redis
            - minio
            - centrifugo
    centrifugo:
        image: 'centrifugo/centrifugo:v5'
        container_name: centrifugo
        command: 'centrifugo -c /centrifugo/config.json'
        volumes:
            - './docker/centrifugo/config.json:/centrifugo/config.json:ro'
        environment:
            CENTRIFUGO_TOKEN_HMAC_SECRET_KEY: '${CENTRIFUGO_TOKEN_HMAC_SECRET}'
            CENTRIFUGO_API_KEY: '${CENTRIFUGO_API_KEY}'
        ports:
            - '${FORWARD_CENTRIFUGO_PORT:-8000}:8000'
        ulimits:
            nofile:
                soft: 65535
                hard: 65535
        networks:
            - sail
            - blog-network
        depends_on:
            - redis
        healthcheck:
            test: ['CMD', 'wget', '-qO-', 'http://localhost:8000/health']
            retries: 3
            timeout: 5s
    pgsql:
        image: 'postgres:16-alpine'
        ports:
            - '${FORWARD_DB_PORT:-5432}:5432'
        environment:
            POSTGRES_DB: '${DB_DATABASE}'
            POSTGRES_USER: '${DB_USERNAME}'
            POSTGRES_PASSWORD: '${DB_PASSWORD}'
        volumes:
            - 'sail-pgsql:/var/lib/postgresql/data'
        networks:
            - sail
        healthcheck:
            test:
                - CMD-SHELL
                - 'pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE}'
            retries: 3
            timeout: 5s
    redis:
        image: 'redis:alpine'
        ports:
            - '${FORWARD_REDIS_PORT:-6379}:6379'
        volumes:
            - 'sail-redis:/data'
        networks:
            - sail
        healthcheck:
            test:
                - CMD
                - redis-cli
                - ping
            retries: 3
            timeout: 5s
    minio:
        image: 'minio/minio:latest'
        ports:
            - '${FORWARD_MINIO_PORT:-9000}:9000'
            - '${FORWARD_MINIO_CONSOLE_PORT:-8900}:8900'
        environment:
            MINIO_ROOT_USER: sail
            MINIO_ROOT_PASSWORD: password
        volumes:
            - 'sail-minio:/data'
        networks:
            - sail
            - blog-network
        command: 'minio server /data --console-address ":8900"'
        healthcheck:
            test:
                - CMD
                - mc
                - ready
                - local
            retries: 3
            timeout: 5s
networks:
    sail:
        driver: bridge
    blog-network:
        external: true

volumes:
    sail-pgsql:
        driver: local
    sail-redis:
        driver: local
    sail-minio:
        driver: local
